name: Vercel Deploy & Notify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Secret Health Check
        env:
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: |
          if [ -z "$RESEND_KEY" ]; then
            echo "::warning::RESEND_API_KEY is missing in GitHub Secrets. Notifications will fail."
          fi
          if [ -z "$ADMIN_EMAIL" ]; then
            echo "::warning::ADMIN_EMAIL is missing in GitHub Secrets."
          fi

      - name: Trigger Vercel Deploy
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_QMfHAL9jua3vwbqX5MBR9Svaj0fT/zxipS340XS"

      - name: Notify TradeLife Admin
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: |
          STATUS="${{ job.status }}"
          if [ ! -z "$RESEND_API_KEY" ] && [ ! -z "$ADMIN_EMAIL" ]; then
            curl -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\": \"TradeLife Ops <deploy@tradelife.app>\", \"to\": \"$ADMIN_EMAIL\", \"subject\": \"Deployment: $STATUS\", \"html\": \"<p>Triggered Vercel build.</p>\"}"
          fi
